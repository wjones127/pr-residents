# PER-USER template. Copy to config/user.yml (gitignored) and fill in.
# Nothing user-specific is ever hardcoded in a skill — skills read this by path.

# Your GitHub login. Used to derive blocked_on=me, filter your own PRs, and
# attribute conditions to your posted review comments.
github_login: your-login-here

# Subset of config/repos.yml you personally subscribe to. Empty = all of them.
subscribed_repos: []

# Path prefixes you care about, used by pr-relevance ONLY as a cold-start signal:
# before you've reviewed enough PRs for path-affinity to mean anything, the
# self-requested triage panel ranks candidates by overlap with these (plus
# hard-escalation paths). Once your review history accumulates, learned
# path-affinity takes over and these matter less. Examples:
#   interests:
#     - rust/lance-encoding
#     - rust/lance-index
interests: []

# Where the routine pushes per-user state back to (§6). Default branch is the
# safe `claude/`-prefixed option that works without unrestricted branch pushes.
state_branch: claude/state

# Env var names the resident reads secrets from (values live in env, not here).
# Fine-grained PATs are single-owner, so tokens are per-org: pr-sync reads
# GITHUB_TOKEN_<ORG> (org upper-snake-cased, e.g. lance-format ->
# GITHUB_TOKEN_LANCE_FORMAT) derived from each repo's owner. No mapping needed
# here unless you override the convention below.
env:
  github_token_prefix: GITHUB_TOKEN   # -> GITHUB_TOKEN_<ORG>
  embedding_api_key: ANTHROPIC_API_KEY  # slice 4 (pr-relevance); unused before
